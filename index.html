<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="theme-color" content="#F4F5FA">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">
<title>Let's Trip</title>
<style>
  *, *::before, *::after { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; background: #DDE0EB; }
  body {
    font-family: -apple-system, "SF Pro Display", "Inter", system-ui, sans-serif;
    -webkit-font-smoothing: antialiased;
    color: #0F1B3D;
  }
  #app {
    max-width: 460px;
    margin: 0 auto;
    min-height: 100vh;
    background: #F4F5FA;
    position: relative;
    box-shadow: 0 0 60px rgba(15,27,61,0.08);
  }
  a { -webkit-tap-highlight-color: transparent; }
  ::-webkit-scrollbar { width: 0; height: 0; }
  #loading-overlay {
    position: fixed; inset: 0; z-index: 9999;
    background: #fff;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    gap: 40px;
    max-width: 460px; margin: 0 auto;
    transition: opacity 0.4s ease;
  }
  #loading-overlay.fade-out { opacity: 0; pointer-events: none; }
  .ld-logo { display: flex; flex-direction: column; align-items: center; gap: 18px; }
  .ld-sub { font-size: 13px; color: #9AA1B8; font-weight: 500; }
  .ld-dots { display: flex; gap: 7px; }
  .ld-dots span {
    width: 8px; height: 8px; border-radius: 50%;
    background: #0099A8; opacity: 0.25;
    animation: ldpulse 1.2s ease-in-out infinite;
  }
  .ld-dots span:nth-child(2) { animation-delay: 0.2s; }
  .ld-dots span:nth-child(3) { animation-delay: 0.4s; }
  @keyframes ldpulse {
    0%, 80%, 100% { opacity: 0.2; transform: scale(0.85); }
    40% { opacity: 1; transform: scale(1); }
  }
</style>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" crossorigin="anonymous"></script>
<script src="https://unpkg.com/lottie-web@5.12.2/build/player/lottie.min.js"></script>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
</head>
<body>
<div id="loading-overlay">
  <div class="ld-logo">
    <img src="assets/lets-trip-logo-brand.png" style="width:72px;height:72px;border-radius:50%;object-fit:cover;" alt="Let's Trip"/>
    <div class="ld-sub">Sayohat Arzonroq bo'ladi - biroz kuting</div>
  </div>
  <div class="ld-dots"><span></span><span></span><span></span></div>
</div>
<div id="app"></div>
<div id="tweaks-root"></div>
<script>
  (function() {
    var v = Date.now();
    var files = ['tweaks-panel.jsx', 'tweaks.jsx', 'screens.jsx'];
    files.forEach(function(f) {
      document.write('<script type="text/babel" src="' + f + '?v=' + v + '"><\/script>');
    });
  })();
</script>
<script type="text/babel">
const { ScreenHome, ScreenServices, ScreenSupport, ScreenProfile, ScreenFlight, ScreenTrip, AirportTweaks, applyLogo, readLogo } = window;

try {
  const saved = readLogo && readLogo();
  if (saved) requestAnimationFrame(() => applyLogo(saved));
} catch (e) {}

function useHash() {
  const [hash, setHash] = React.useState(window.location.hash || '#/');
  React.useEffect(() => {
    const onChange = () => {
      setHash(window.location.hash || '#/');
      window.scrollTo(0, 0);
    };
    window.addEventListener('hashchange', onChange);
    return () => window.removeEventListener('hashchange', onChange);
  }, []);
  return hash;
}

function Router() {
  const hash = useHash();
  const route = hash.replace(/^#\/?/, '');

  React.useEffect(() => {
    const el = document.getElementById('loading-overlay');
    if (!el) return;
    el.classList.add('fade-out');
    const t = setTimeout(() => { if (el) el.style.display = 'none'; }, 450);
    return () => clearTimeout(t);
  }, []);

  switch (route) {
    case 'services': return <ScreenServices/>;
    case 'support':  return <ScreenSupport/>;
    case 'profile':  return <ScreenProfile/>;
    case 'flight':   return <ScreenFlight/>;
    case 'trip':     return <ScreenTrip/>;
    default:         return <ScreenHome/>;
  }
}

ReactDOM.createRoot(document.getElementById('app')).render(<Router/>);
ReactDOM.createRoot(document.getElementById('tweaks-root')).render(<AirportTweaks/>);
</script>
</body>
</html>
