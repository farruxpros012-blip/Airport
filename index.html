<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="theme-color" content="#F4F5FA">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">
<title>Let's Trip</title>
<style>
  *, *::before, *::after { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; background: #DDE0EB; }
  body {
    font-family: -apple-system, "SF Pro Display", "Inter", system-ui, sans-serif;
    -webkit-font-smoothing: antialiased;
    color: #0F1B3D;
  }
  /* Mobile-first container — centered on desktop with side gutters */
  #app {
    max-width: 460px;
    margin: 0 auto;
    min-height: 100vh;
    background: #F4F5FA;
    position: relative;
    box-shadow: 0 0 60px rgba(15,27,61,0.08);
  }
  a { -webkit-tap-highlight-color: transparent; }
  /* Hide scrollbars on inner scroll regions for app feel */
  ::-webkit-scrollbar { width: 0; height: 0; }
</style>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
</head>
<body>
<div id="app"></div>
<div id="tweaks-root"></div>
<script>
  // Cache-bust JSX files on every load — guarantees fresh code on every refresh
  (function() {
    var v = Date.now();
    var files = ['tweaks-panel.jsx', 'tweaks.jsx', 'screens.jsx'];
    files.forEach(function(f) {
      document.write('<script type="text/babel" src="' + f + '?v=' + v + '"><\/script>');
    });
  })();
</script>
<script type="text/babel">
const { ScreenHome, ScreenServices, ScreenSupport, ScreenProfile, ScreenFlight, ScreenTrip, AirportTweaks, applyLogo, readLogo } = window;

// Apply persisted logo on first paint, before user opens the panel.
try {
  const saved = readLogo && readLogo();
  if (saved) requestAnimationFrame(() => applyLogo(saved));
} catch (e) {}

function useHash() {
  const [hash, setHash] = React.useState(window.location.hash || '#/');
  React.useEffect(() => {
    const onChange = () => {
      setHash(window.location.hash || '#/');
      window.scrollTo(0, 0);
    };
    window.addEventListener('hashchange', onChange);
    return () => window.removeEventListener('hashchange', onChange);
  }, []);
  return hash;
}

function Router() {
  const hash = useHash();
  const route = hash.replace(/^#\/?/, '');
  switch (route) {
    case 'services': return <ScreenServices/>;
    case 'support':  return <ScreenSupport/>;
    case 'profile':  return <ScreenProfile/>;
    case 'flight':   return <ScreenFlight/>;
    case 'trip':     return <ScreenTrip/>;
    default:         return <ScreenHome/>;
  }
}

ReactDOM.createRoot(document.getElementById('app')).render(<Router/>);
ReactDOM.createRoot(document.getElementById('tweaks-root')).render(<AirportTweaks/>);
</script>
</body>
</html>
