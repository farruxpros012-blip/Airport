<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="theme-color" content="#F4F5FA">
<title>Let's Trip</title>
<style>
  *, *::before, *::after { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; background: #DDE0EB; }
  body {
    font-family: -apple-system, "SF Pro Display", "Inter", system-ui, sans-serif;
    -webkit-font-smoothing: antialiased;
    color: #0F1B3D;
  }
  #app {
    max-width: 460px;
    margin: 0 auto;
    min-height: 100vh;
    background: #F4F5FA;
    position: relative;
    box-shadow: 0 0 60px rgba(15,27,61,0.08);
  }
  a { -webkit-tap-highlight-color: transparent; }
  ::-webkit-scrollbar { width: 0; height: 0; }
  #loading-overlay {
    position: fixed; inset: 0; z-index: 9999;
    background: #fff;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    gap: 40px;
    max-width: 460px; margin: 0 auto;
    transition: opacity 0.4s ease;
  }
  #loading-overlay.fade-out { opacity: 0; pointer-events: none; }
  .ld-logo { display: flex; flex-direction: column; align-items: center; gap: 18px; }
  .ld-sub { font-size: 13px; color: #9AA1B8; font-weight: 500; }
  .ld-dots { display: flex; gap: 7px; }
  .ld-dots span {
    width: 8px; height: 8px; border-radius: 50%;
    background: #0099A8; opacity: 0.25;
    animation: ldpulse 1.2s ease-in-out infinite;
  }
  .ld-dots span:nth-child(2) { animation-delay: 0.2s; }
  .ld-dots span:nth-child(3) { animation-delay: 0.4s; }
  @keyframes ldpulse {
    0%, 80%, 100% { opacity: 0.2; transform: scale(0.85); }
    40% { opacity: 1; transform: scale(1); }
  }
</style>
</head>
<body>
<div id="loading-overlay">
  <div class="ld-logo">
    <img src="assets/lets-trip-logo-brand.png" style="width:72px;height:72px;border-radius:50%;object-fit:cover;" alt="Let's Trip"/>
    <div class="ld-sub">Sayohat Arzonroq bo'ladi - biroz kuting</div>
  </div>
  <div class="ld-dots"><span></span><span></span><span></span></div>
</div>
<div id="app"></div>
<div id="tweaks-root"></div>
<script type="module" src="/src/main.jsx"></script>
</body>
</html>
